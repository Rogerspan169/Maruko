<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>宇宙鐵道之旅</title>
  <style>
    body {
      background: #020813;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
      min-height: 100vh;
      user-select: none;
      overflow-x: hidden;
    }
    h1 {
      font-size: 20px;
      margin: 5px 0;
      letter-spacing: 2px;
      color: #8da9c4;
      text-align: center;
    }
    .hud {
      font-size: 16px;
      color: #00ffcc;
      margin: 10px 0;
      font-weight: bold;
      text-align: center;
      min-height: 24px;
    }
    
    /* 關卡容器管理 */
    .stage-container {
      display: none; 
      width: 100%;
      max-width: 900px;
      flex-direction: column;
      align-items: center;
    }
    .active-stage {
      display: flex;
    }

    /* 畫布與外框 */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    .game-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      width: 100%;
    }
    canvas {
      background: linear-gradient(to bottom, #020a17 0%, #061c33 70%, #112b47 100%);
      border: 2px solid #1a3a4b;
      width: 100%;
      height: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      display: block;
    }
    .label {
      text-align: center;
      font-size: 12px;
      color: #647a91;
      margin-top: 5px;
    }

    /* 通用按鈕 */
    .btn-next {
      background: #00ffcc;
      color: #020813;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
      transition: all 0.2s ease;
      display: none; 
    }
    .btn-next:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.8);
    }

    /* 科普知識提示彈窗樣式 */
    .pop-overlay {
      display: none; 
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(2, 8, 19, 0.85);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .pop-box {
      background: linear-gradient(135deg, #0b1a30 0%, #051021 100%);
      border: 2px solid #00ffcc;
      border-radius: 15px;
      padding: 25px;
      width: 85%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .pop-title {
      font-size: 18px;
      font-weight: bold;
      color: #00ffcc;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
    .pop-text {
      font-size: 14px;
      line-height: 1.6;
      color: #e0e6ed;
      margin-bottom: 20px;
      text-align: justify;
    }
    .pop-btn {
      background: #00ffcc;
      color: #020813;
      border: none;
      padding: 8px 24px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
    }
    .pop-btn:active {
      transform: scale(0.95);
    }

    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ==================== 第一關：大家來找碴 ==================== -->
  <div id="stage1" class="stage-container active-stage">
    <h1>🌌 第一關：雙十字・星空找碴(天鵝座)</h1>
    <div class="hud" id="hud1">尋找異象：0 / 4</div>
    <div class="game-container">
      <div class="canvas-wrapper">
        <canvas id="canvasLeft" width="400" height="500"></canvas>
        <div class="label">觀測盤 A</div>
      </div>
      <div class="canvas-wrapper">
        <canvas id="canvasRight" width="400" height="500"></canvas>
        <div class="label">觀測盤 B</div>
      </div>
    </div>
    <button class="btn-next" id="btnGoToStage2">通過天鵝座!前往下一站 ➔</button>
  </div>

  <!-- 科普彈窗 HTML 結構 -->
  <div class="pop-overlay" id="popOverlay">
    <div class="pop-box">
      <div class="pop-title">🌌 天文觀測紀錄</div>
      <div class="pop-text">天鵝座因其十字形狀而又被稱為"北十字"，要注意不要將其和南天的南十字座混淆囉！</div>
      <button class="pop-btn" id="popBtnConfirm">確認</button>
    </div>
  </div>

  <!-- ==================== 第二關：星空連連看 ==================== -->
  <div id="stage2" class="stage-container">
    <h1>🌌 第二關：恆星連連看(天鷹座)</h1>
    <div class="hud" id="hud2">請將左側星體拖曳連線至右側正確答案</div>
    <div class="canvas-wrapper">
      <canvas id="canvasMatch" width="400" height="480" style="background: radial-gradient(circle, #081a30 0%, #030d1a 100%);"></canvas>
    </div>
    <button class="btn-next" id="btnGoToStage3">通過天鷹座!前往下一站 ➔</button>
  </div>

  <!-- ==================== 第三關：逃離心宿二 (直向迷宮) ==================== -->
  <div id="stage3" class="stage-container">
    <h1 id="mazeTitle">🌌 終極關：星河逃生・心宿二的怒吼</h1>
    <div class="hud" id="hud3">按住並拖曳藍色光點往上逃！避開下方逼近的紅超巨星等離子！</div>
    <div class="canvas-wrapper">
      <canvas id="canvasMaze" width="400" height="500" style="background: #020712;"></canvas>
    </div>
    <button class="btn-next" id="btnRestart" style="display:none; background: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);">重新挑戰 🔄</button>
  </div>

  <!-- ⭐ 新增：第三關規則提示彈窗 ⭐ -->
<div class="pop-overlay" id="mazeRuleOverlay">
  <div class="pop-box" style="border-color: #ff3366; box-shadow: 0 0 30px rgba(255, 51, 102, 0.3);">
    <div class="pop-title" style="color: #ff3366;">🔥 終極關卡：逃離心宿二</div>
    <div class="pop-text">
      心宿二正發生超新星引力崩潰與膨脹！<br><br>
      1. 透過【按住並拖曳】藍色量子光點往上逃生。<br>
      2. 沿途迷宮充滿阻擋的牆壁與重力阻尼。<br>
      3. 下方熾熱的等離子火海會不斷加速向上吞噬，一旦被觸碰即毀滅！
    </div>
    <button class="pop-btn" id="mazeRuleBtnConfirm" style="background: #ff3366; color: white;">啟動引擎逃生</button>
  </div>
</div>

<script>
// ⭐ 新增：第三關規則彈窗元素獲取
const mazeRuleOverlay = document.getElementById("mazeRuleOverlay");
const mazeRuleBtnConfirm = document.getElementById("mazeRuleBtnConfirm");
let isPausedForMazeRule = false; // 控制第三關開始前的規則鎖
// ============================================================================
//                          第一關與第二關通用輔助
// ============================================================================
function drawStar(ctx, x, y, r, color, glow = 0, glowColor = "#fff") {
  if (glow > 0) { ctx.shadowBlur = glow; ctx.shadowColor = glowColor; }
  ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ============================================================================
//                          第一關：大家來找碴
// ============================================================================
const canvasL = document.getElementById("canvasLeft"); const ctxL = canvasL.getContext("2d");
const canvasR = document.getElementById("canvasRight"); const ctxR = canvasR.getContext("2d");
const hud1 = document.getElementById("hud1"); const btnGoToStage2 = document.getElementById("btnGoToStage2");
const popOverlay = document.getElementById("popOverlay");
const popBtnConfirm = document.getElementById("popBtnConfirm");

let foundCount = 0; let gameOver1 = false; let floatingTexts1 = [];
let isPausedForPopup = false; 
const backgroundStars = [];
for (let i = 0; i < 150; i++) {
  backgroundStars.push({ x: Math.random() * 400, y: Math.random() * 500, r: Math.random() * 1.3, alpha: Math.random() * 0.6 + 0.2 });
}

// ⭐ 升級：星空事件「安全距離保證鎖」演算法
function getSafeRandomCoord(minX, maxX, minY, maxY, minDistance) {
  let x, y, dist;
  let attempts = 0;
  do {
    x = Math.random() * (maxX - minX) + minX;
    y = Math.random() * (maxY - minY) + minY;
    // 計算該點與中央十字星 (200, 180) 的直線距離
    dist = Math.hypot(x - 200, y - 180);
    attempts++;
  } while (dist < minDistance && attempts < 100); // 如果太近就重新抽籤，最多嘗試100次防死鎖
  return { x, y };
}

// 產生四周安全地帶的異象座標 (保證離中央十字至少 110 像素遠)
const evtCoord1 = getSafeRandomCoord(30, 370, 40, 440, 110);
const evtCoord2 = getSafeRandomCoord(30, 370, 40, 440, 110);
const evtCoord3 = getSafeRandomCoord(30, 370, 40, 440, 110);

// 7 種超豐富找碴事件池 (套用安全座標)
const possibleEvents = [
  { name: "望遠鏡種類不同", xl: 200, yl: 450, xr: 200, yr: 450, radius: 40, type: "telescope" },
  { name: "流星劃過天空", xl: evtCoord1.x, yl: evtCoord1.y, xr: evtCoord1.x, yr: evtCoord1.y, radius: 25, type: "meteor" },
  { name: "星色轉變異象", xl: evtCoord2.x, yl: evtCoord2.y, xr: evtCoord2.x, yr: evtCoord2.y, radius: 20, type: "color_change" },
  { name: "未知新星誕生", xl: evtCoord3.x, yl: evtCoord3.y, xr: evtCoord3.x, yr: evtCoord3.y, radius: 20, type: "nova" },
  { name: "星雲裂隙反應", xl: evtCoord1.x, yl: evtCoord2.y, xr: evtCoord1.x, yr: evtCoord2.y, radius: 25, type: "nebula_ring" },
  { name: "極光離子微粒", xl: 45, yl: 220, xr: 45, yr: 220, radius: 25, type: "aurora_glow" }, // 左邊緣安全
  { name: "紅巨星先兆爆發", xl: 355, yl: 100, xr: 355, yr: 100, radius: 30, type: "supernova_flash" } // 右上角安全
];

const selectedRandomEvents = [...possibleEvents].sort(() => Math.random() - 0.5).slice(0, 3);
const hasTelescopeDiff = selectedRandomEvents.some(e => e.type === "telescope");

const differences = [
  { id: 1, name: "北十字天鵝座 vs 南十字星", xl: 200, yl: 180, xr: 200, yr: 180, radius: 65, found: false, type: "constellation" },
  ...selectedRandomEvents.map((evt, index) => ({ id: index + 2, name: evt.name, xl: evt.xl, yl: evt.yl, xr: evt.xr, yr: evt.yr, radius: evt.radius, found: false, type: evt.type }))
];

function renderStage1() {
  ctxL.clearRect(0, 0, canvasL.width, canvasL.height); ctxR.clearRect(0, 0, canvasR.width, canvasR.height);
  drawSkyAndLandscape(ctxL, "left"); drawSkyAndLandscape(ctxR, "right"); drawFoundCircles(); updateAndDrawFloatingTexts1();
  if (foundCount === differences.length && !gameOver1) {
    gameOver1 = true; hud1.innerText = "🌟 第一關觀測完成！你成功辨識了南北十字與異象！";
    btnGoToStage2.style.display = "block";
  }
}

function drawSkyAndLandscape(ctx, side) {
  backgroundStars.forEach(star => {
    ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctx.beginPath(); ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2); ctx.fill();
  });

  differences.forEach(diff => {
    if (diff.type === "meteor" && side === "left") {
      ctx.strokeStyle = "rgba(255, 255, 255, 0.7)"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(diff.xl - 15, diff.yl - 15); ctx.lineTo(diff.xl + 15, diff.yl + 15); ctx.stroke();
      drawStar(ctx, diff.xl + 15, diff.yl + 15, 2.5, "#fff", 6);
    } 
    else if (diff.type === "color_change") {
      if (side === "left") drawStar(ctx, diff.xl, diff.yl, 4, "#00ffff", 8, "#00ffff");
      else drawStar(ctx, diff.xr, diff.yr, 4.5, "#ff3366", 10, "#ff3366");
    } 
    else if (diff.type === "nova" && side === "right") {
      drawStar(ctx, diff.xr, diff.yr, 5, "#ffffff", 12, "#ffffaa");
    }
    else if (diff.type === "nebula_ring") {
      drawStar(ctx, diff.xl, diff.yl, 3, "#ffffff");
      if (side === "right") {
        ctx.strokeStyle = "rgba(0, 255, 204, 0.5)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(diff.xr, diff.yr, 10, 0, Math.PI * 2); ctx.stroke();
      }
    }
    else if (diff.type === "aurora_glow" && side === "right") {
      ctx.fillStyle = "rgba(0, 255, 102, 0.15)";
      ctx.beginPath(); ctx.arc(diff.xr, diff.yr, 20, 0, Math.PI*2); ctx.fill();
      drawStar(ctx, diff.xr, diff.yr, 3.5, "#00ff66", 8, "#00ff66");
    }
    else if (diff.type === "supernova_flash") {
      if (side === "left") {
        drawStar(ctx, diff.xl, diff.yl, 2, "#ffccaa");
      } else {
        drawStar(ctx, diff.xr, diff.yr, 8, "#ff3333", 18, "#ff0000");
      }
    }
  });

  ctx.save(); ctx.translate(200, 180);
  if (side === "left") {
    ctx.strokeStyle = "rgba(0, 255, 204, 0.25)"; ctx.lineWidth = 1.5; ctx.beginPath();
    ctx.moveTo(0, 65); ctx.lineTo(0, -10); ctx.lineTo(2, -35); ctx.lineTo(4, -85);
    ctx.moveTo(-90, -10); ctx.lineTo(-45, -28); ctx.lineTo(2, -35); ctx.lineTo(48, -26); ctx.lineTo(92, -8); ctx.stroke();
    drawStar(ctx, 4, -85, 6, "#ffffff", 14, "#00ffcc"); drawStar(ctx, 2, -35, 3.5, "#8da9c4"); drawStar(ctx, 0, -10, 3, "#8da9c4");
    drawStar(ctx, 0, 65, 3.5, "#8da9c4"); drawStar(ctx, -45, -28, 3.5, "#8da9c4"); drawStar(ctx, -90, -10, 3, "#8da9c4");
    drawStar(ctx, 48, -26, 3.5, "#8da9c4"); drawStar(ctx, 92, -8, 3, "#8da9c4");
  } else {
    ctx.strokeStyle = "rgba(255, 204, 0, 0.3)"; ctx.lineWidth = 1.5; ctx.beginPath();
    ctx.moveTo(3, -45); ctx.lineTo(0, 45); ctx.moveTo(-33, 15); ctx.lineTo(31, -5); ctx.stroke();
    drawStar(ctx, 3, -45, 4.5, "#ffcc00", 8); drawStar(ctx, 0, 45, 6.5, "#ffffff", 15, "#ffcc00");
    drawStar(ctx, -33, 15, 5.5, "#ffcc00", 10); drawStar(ctx, 31, -5, 4, "#ffcc00", 6); drawStar(ctx, 10, 24, 2.5, "#ff8800");
  }
  ctx.restore();

  ctx.fillStyle = "#050f1a"; ctx.beginPath(); ctx.moveTo(0, 440); ctx.quadraticCurveTo(120, 420, 200, 450); ctx.quadraticCurveTo(300, 470, 400, 430); ctx.lineTo(400, 500); ctx.lineTo(0, 500); ctx.fill();
  ctx.fillStyle = "#02070d"; ctx.beginPath(); ctx.arc(170, 445, 12, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(155, 500); ctx.lineTo(165, 457); ctx.lineTo(175, 457); ctx.lineTo(185, 500); ctx.fill();
  ctx.strokeStyle = "#02070d"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(185, 460); ctx.lineTo(200, 485); ctx.stroke();

  ctx.save(); ctx.translate(185, 455); ctx.rotate(-0.6);
  if (hasTelescopeDiff && side === "right") drawBinocularTelescope(ctx); else drawSingleTelescope(ctx);
  ctx.restore();
}

function drawSingleTelescope(ctx) {
  ctx.fillStyle = "#0c1f33"; ctx.strokeStyle = "#02070d"; ctx.lineWidth = 1.5; ctx.fillRect(-5, -25, 10, 35); ctx.strokeRect(-5, -25, 10, 35); ctx.fillRect(-7, -27, 14, 4);
}
function drawBinocularTelescope(ctx) {
  ctx.fillStyle = "#1c3552"; ctx.strokeStyle = "#02070d"; ctx.lineWidth = 1.5; ctx.fillRect(-9, -20, 7, 25); ctx.fillRect(2, -20, 7, 25); ctx.strokeRect(-9, -20, 7, 25); ctx.strokeRect(2, -20, 7, 25); ctx.fillRect(-3, -12, 6, 4);
}

// 畫圈
function drawFoundCircles() {
  differences.forEach(diff => {
    if (diff.found) {
      ctxL.strokeStyle = "#00ffcc"; ctxL.lineWidth = 3; ctxL.beginPath(); ctxL.arc(diff.xl, diff.yl, diff.radius * 0.7, 0, Math.PI * 2); ctxL.stroke();
      ctxR.strokeStyle = "#00ffcc"; ctxR.lineWidth = 3; ctxR.beginPath(); ctxR.arc(diff.xr, diff.yr, diff.radius * 0.7, 0, Math.PI * 2); ctxR.stroke();
    }
  });
}

function setupClickEvents1(canvas, side) {
  canvas.addEventListener("click", (e) => {
    if (gameOver1 || isPausedForPopup) return; 
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
    const clickX = (e.clientX - rect.left) * scaleX; const clickY = (e.clientY - rect.top) * scaleY;
    let hit = false;
    
    differences.forEach(diff => {
      if (diff.found) return;
      let targetX = (side === "left") ? diff.xl : diff.xr; let targetY = (side === "left") ? diff.yl : diff.yr;
      if (Math.hypot(clickX - targetX, clickY - targetY) < diff.radius) {
        diff.found = true; foundCount++; hit = true;
        hud1.innerText = `尋找異象：${foundCount} / 4`;
        
        if (diff.type === "constellation") {
          triggerPopup();
        } else {
          addFloatingText1(clickX, clickY, "FOUND!");
        }
      }
    });
    if (hit) renderStage1();
  });
}

function triggerPopup() {
  isPausedForPopup = true;
  popOverlay.style.display = "flex";
}

popBtnConfirm.addEventListener("click", () => {
  popOverlay.style.display = "none";
  isPausedForPopup = false;
});

function addFloatingText1(x, y, text) { floatingTexts1.push({ x, y, text, life: 60, vy: -0.6 }); }
function updateAndDrawFloatingTexts1() {
  floatingTexts1.forEach(ft => {
    ctxL.fillStyle = "#00ffcc"; ctxL.font = "bold 18px Arial"; ctxL.fillText(ft.text, ft.x - 30, ft.y);
    ctxR.fillStyle = "#00ffcc"; ctxR.font = "bold 18px Arial"; ctxR.fillText(ft.text, ft.x - 30, ft.y);
    ft.y += ft.vy; ft.life--;
  });
  floatingTexts1 = floatingTexts1.filter(ft => ft.life > 0);
}
setupClickEvents1(canvasL, "left"); setupClickEvents1(canvasR, "right");

// ============================================================================
//                          第二關：星空連連看
// ============================================================================
const canvasM = document.getElementById("canvasMatch"); const ctxM = canvasM.getContext("2d");
const hud2 = document.getElementById("hud2"); const btnGoToStage3 = document.getElementById("btnGoToStage3");

const QA_DATABASE = [
  { id: 1, question: "河鼓二", answer: "又名牛郎星" }, { id: 2, question: "織女星", answer: "屬於天琴座" },
  { id: 3, question: "心宿二", answer: "直徑約為太陽700倍" }, { id: 4, question: "天津四", answer: "位於天鵝座尾巴" }
];
let questions = []; let answers = []; let activeLine = null; let connections = []; let selectedLeft = null;

function initStage2() {
  connections = []; activeLine = null; selectedLeft = null; btnGoToStage3.style.display = "none";
  hud2.innerText = "請將左側星體拖曳連線至右側正確答案"; hud2.style.color = "#00ffcc";
  const shuffledQ = [...QA_DATABASE].sort(() => Math.random() - 0.5);
  const shuffledA = [...QA_DATABASE].sort(() => Math.random() - 0.5);

  questions = shuffledQ.map((item, index) => ({ id: item.id, text: item.question, x: 40, y: 80 + index * 100, w: 120, h: 50, dotX: 160, dotY: 105 + index * 100 }));
  answers = shuffledA.map((item, index) => ({ id: item.id, text: item.answer, x: 240, y: 80 + index * 100, w: 120, h: 50, dotX: 240, dotY: 105 + index * 100 }));
  renderStage2();
}

function renderStage2() {
  ctxM.clearRect(0, 0, canvasM.width, canvasM.height);
  ctxM.fillStyle = "rgba(255,255,255,0.15)";
  for(let i=0; i<30; i++) { ctxM.fillRect((i*17)%400, (i*23)%480, 1.5, 1.5); }

  connections.forEach(conn => {
    const q = questions.find(item => item.id === conn.qId); const a = answers.find(item => item.id === conn.aId);
    if (q && a) drawLaserLine(q.dotX, q.dotY, a.dotX, a.dotY, "#00ffcc");
  });
  if (activeLine) drawLaserLine(activeLine.startX, activeLine.startY, activeLine.currentX, activeLine.currentY, "#ffcc00");

  questions.forEach(q => {
    const isCompleted = connections.some(c => c.qId === q.id); const isSelected = selectedLeft === q;
    ctxM.fillStyle = isCompleted ? "rgba(0, 255, 204, 0.08)" : (isSelected ? "rgba(255, 204, 0, 0.1)" : "rgba(26, 58, 75, 0.4)");
    ctxM.strokeStyle = isCompleted ? "#00ffcc" : (isSelected ? "#ffcc00" : "#1a3a4b"); ctxM.lineWidth = 2;
    roundRect(ctxM, q.x, q.y, q.w, q.h, 8, true, true);
    ctxM.fillStyle = isCompleted ? "#00ffcc" : (isSelected ? "#ffcc00" : "#ffffff"); ctxM.font = "bold 14px Arial"; ctxM.textAlign = "center"; ctxM.fillText(q.text, q.x + q.w/2, q.y + q.h/2 + 5);
    ctxM.fillStyle = isCompleted ? "#00ffcc" : "#8da9c4"; ctxM.beginPath(); ctxM.arc(q.dotX, q.dotY, 5, 0, Math.PI*2); ctxM.fill();
  });

  answers.forEach(a => {
    const isCompleted = connections.some(c => c.aId === a.id);
    ctxM.fillStyle = isCompleted ? "rgba(0, 255, 204, 0.08)" : "rgba(26, 58, 75, 0.4)";
    ctxM.strokeStyle = isCompleted ? "#00ffcc" : "#1a3a4b"; ctxM.lineWidth = 2;
    roundRect(ctxM, a.x, a.y, a.w, a.h, 8, true, true);
    ctxM.fillStyle = isCompleted ? "#00ffcc" : "#ffffff"; ctxM.font = a.text.length > 8 ? "10px Arial" : "12px Arial"; ctxM.textAlign = "center"; ctxM.fillText(a.text, a.x + a.w/2, a.y + a.h/2 + 4);
    ctxM.fillStyle = isCompleted ? "#00ffcc" : "#8da9c4"; ctxM.beginPath(); ctxM.arc(a.dotX, a.dotY, 5, 0, Math.PI*2); ctxM.fill();
  });
}

function drawLaserLine(x1, y1, x2, y2, color) {
  ctxM.save(); ctxM.shadowBlur = 8; ctxM.shadowColor = color; ctxM.strokeStyle = color; ctxM.lineWidth = 3; ctxM.beginPath(); ctxM.moveTo(x1, y1); ctxM.lineTo(x2, y2); ctxM.stroke(); ctxM.restore();
}
function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
  ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius); ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius); ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath();
  if (fill) ctx.fill(); if (stroke) ctx.stroke();
}

// ⭐ 修正後的手機/電腦雙適配座標換算引擎
function getCanvasCoords(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  
  let clientX = e.clientX;
  let clientY = e.clientY;
  
  // 如果是手機觸控事件
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } 
  // ⭐ 關鍵修復：如果是放開手指事件(touchend)，必須讀取 changedTouches
  else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX;
    clientY = e.changedTouches[0].clientY;
  }
  
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function onStart2(e) {
  e.preventDefault(); const coords = getCanvasCoords(e, canvasM);
  questions.forEach(q => {
    if (connections.some(c => c.qId === q.id)) return;
    if (coords.x >= q.x && coords.x <= q.x + q.w && coords.y >= q.y && coords.y <= q.y + q.h) {
      activeLine = { startX: q.dotX, startY: q.dotY, currentX: coords.x, currentY: coords.y, fromId: q.id }; selectedLeft = q; renderStage2();
    }
  });
}
function onMove2(e) {
  if (!activeLine) return; e.preventDefault(); const coords = getCanvasCoords(e, canvasM);
  activeLine.currentX = coords.x; activeLine.currentY = coords.y; renderStage2();
}
function onEnd2(e) {
  if (!activeLine) return; e.preventDefault(); const coords = getCanvasCoords(e, canvasM);
  answers.forEach(a => {
    if (coords.x >= a.x && coords.x <= a.x + a.w && coords.y >= a.y && coords.y <= a.y + a.h) {
      if (a.id === activeLine.fromId) {
        connections.push({ qId: activeLine.fromId, aId: a.id }); hud2.innerText = "答對了！星塵軌道成功對齊。"; hud2.style.color = "#00ffcc";
      } else {
        hud2.innerText = "觀測線偏差... 兩者物理性質不符。"; hud2.style.color = "#ff3366";
      }
    }
  });
  activeLine = null; selectedLeft = null; renderStage2();
  if (connections.length === QA_DATABASE.length) {
    hud2.innerText = "🌟 第二關觀測大成功！心宿二正在崩潰，快前往終極關卡逃生！";

}

// ============================================================================
//                    第三關：直向卷軸迷宮 (保證連通極限版)
// ============================================================================
const canvasZ = document.getElementById("canvasMaze"); const ctxZ = canvasZ.getContext("2d");
const hud3 = document.getElementById("hud3"); const btnRestart = document.getElementById("btnRestart");
const mazeTitle = document.getElementById("mazeTitle");

const COLS = 10; const ROWS = 60; 
const CELL_SIZE = 40;
const MAP_HEIGHT = ROWS * CELL_SIZE; 

let mazeWalls = []; 
let player = { 
  x: 200, y: MAP_HEIGHT - 30, 
  targetX: 200, targetY: MAP_HEIGHT - 30, 
  radius: 8, 
  isDragging: false 
};

let lavaY = MAP_HEIGHT - 40; 
let lavaSpeed = 1.85; 
let gameOver3 = false;
let gameWin3 = false;

function generateMaze() {
  mazeWalls = Array(ROWS).fill().map(() => Array(COLS).fill(false));
  
  for (let r = 0; r < ROWS; r++) {
    mazeWalls[r][0] = true;
    mazeWalls[r][COLS - 1] = true;
  }
  
  let guaranteedPath = Array(ROWS).fill(0);
  guaranteedPath[ROWS - 1] = 4; 
  
  for (let r = ROWS - 2; r >= 0; r--) {
    let prevC = guaranteedPath[r + 1];
    let minC = Math.max(1, prevC - 2);
    let maxC = Math.min(COLS - 2, prevC + 2);
    let nextC = Math.floor(Math.random() * (maxC - minC + 1)) + minC;
    guaranteedPath[r] = nextC;
  }

  for (let r = 1; r < ROWS - 1; r++) {
    for (let c = 1; c < COLS - 1; c++) {
      let isOnGuaranteedPath = false;
      
      if (c === guaranteedPath[r]) {
        isOnGuaranteedPath = true;
      }
      
      let pathCurrent = guaranteedPath[r];
      let pathNext = guaranteedPath[r + 1];
      let minPathX = Math.min(pathCurrent, pathNext);
      let maxPathX = Math.max(pathCurrent, pathNext);
      
      if (c >= minPathX && c <= maxPathX) {
        isOnGuaranteedPath = true;
      }

      if (!isOnGuaranteedPath) {
        if (Math.random() < 0.42) {
          mazeWalls[r][c] = true;
        }
      }
    }
  }

  for (let c = 1; c < COLS - 1; c++) {
    mazeWalls[ROWS - 1][c] = false;
    mazeWalls[ROWS - 2][c] = false;
  }
  for (let c = 1; c < COLS - 1; c++) {
    mazeWalls[1][c] = false;
    mazeWalls[2][c] = false;
  }
}

function initStage3() {
  gameOver3 = false; gameWin3 = false;
  // 重置時復原標題文字
  mazeTitle.innerText = "🌌 終極關：星河逃生・心宿二的怒吼";
  mazeTitle.style.display = "block";
  player.x = 200; player.y = MAP_HEIGHT - 30;
  player.targetX = 200; player.targetY = MAP_HEIGHT - 30;
  player.isDragging = false;
  lavaY = MAP_HEIGHT + 120; 
  btnRestart.style.display = "none";
  hud3.innerText = "按住並拖曳藍色光點往上逃！避開下方逼近的紅超巨星等離子！";
  hud3.style.color = "#ffcc00";
  generateMaze();
  
  // ⭐ 修改：先渲染首幀畫面，然後跳出規則彈窗並鎖定，不直接執行 tickStage3
  renderStage3(); 
  isPausedForMazeRule = true;
  mazeRuleOverlay.style.display = "flex";
}

function resolveCollisions(oldX, oldY) {
  const pr = player.radius;
  if (player.x - pr < 0) player.x = pr;
  if (player.x + pr > 400) player.x = 400 - pr;
  if (player.y - pr < 0) player.y = pr;
  if (player.y + pr > MAP_HEIGHT) player.y = MAP_HEIGHT - pr;

  let tempX = player.x; player.x = oldX; 
  if (!isColliding(player.x, tempX, player.y, player.y)) player.x = tempX; 

  let tempY = player.y; player.y = oldY; 
  if (!isColliding(player.x, player.x, player.y, tempY)) player.y = tempY;
}

function isColliding(x1, x2, y1, y2) {
  const pr = player.radius;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (mazeWalls[r][c]) {
        let wx = c * CELL_SIZE; let wy = r * CELL_SIZE;
        if (x2 + pr > wx && x2 - pr < wx + CELL_SIZE && y2 + pr > wy && y2 - pr < wy + CELL_SIZE) return true;
      }
    }
  }
  return false;
}

function onStart3(e) {
  if (gameOver3 || gameWin3 || isPausedForMazeRule) return; // ⭐ 新增 isPausedForMazeRule 判定
  // ... 以下原本的拖曳邏輯不變
  if (gameOver3 || gameWin3) return;
  e.preventDefault();
  const coords = getCanvasCoords(e, canvasZ);
  const cameraY = player.y - 300;
  const worldY = coords.y + cameraY;
  if (Math.hypot(coords.x - player.x, worldY - player.y) < player.radius * 4) {
    player.isDragging = true; player.targetX = coords.x; player.targetY = worldY;
  }
}

function onMove3(e) {
  if (!player.isDragging || gameOver3 || gameWin3) return;
  e.preventDefault();
  const coords = getCanvasCoords(e, canvasZ);
  player.targetX = coords.x; player.targetY = coords.y + (player.y - 300);
}
function onEnd3() { player.isDragging = false; }

canvasZ.addEventListener("mousedown", onStart3); canvasZ.addEventListener("mousemove", onMove3); window.addEventListener("mouseup", onEnd3);
canvasZ.addEventListener("touchstart", onStart3, { passive: false }); canvasZ.addEventListener("touchmove", onMove3, { passive: false }); window.addEventListener("touchend", onEnd3);

// 遊戲心跳
function tickStage3() {
  // 🌟 通關後依然不中斷，維持不斷重繪以達到動態列車效果 🌟
  if (gameWin3) {
    renderStage3();
    requestAnimationFrame(tickStage3);
    return;
  }
  if (gameOver3) return;

  if (player.isDragging) {
    let oldX = player.x; let oldY = player.y;
    let dx = player.targetX - player.x; let dy = player.targetY - player.y;
    let distance = Math.hypot(dx, dy);

    if (distance > 0.1) {
      let ease = 0.12; let stepX = dx * ease; let stepY = dy * ease;
      const maxSpeed = 7.5; let stepDist = Math.hypot(stepX, stepY);
      if (stepDist > maxSpeed) { stepX = (stepX / stepDist) * maxSpeed; stepY = (stepY / stepDist) * maxSpeed; }
      player.x += stepX; player.y += stepY;
      resolveCollisions(oldX, oldY);
    }
  }

  lavaY -= lavaSpeed;

  // 3. 判斷勝負條件
  if (player.y >= lavaY - player.radius) {
    gameOver3 = true;
    hud3.innerText = "💥 你的太空船被膨脹中的心宿二吞噬了！";
    hud3.style.color = "#ff3366";
    btnRestart.style.display = "block";
    renderStage3();
  }
  // ⭐ 升級：精準圓形星門範圍判定（中心為 200, 40）
  else if (Math.hypot(player.x - 200, player.y - 40) < 22) { 
    gameWin3 = true;
    mazeTitle.style.display = "none"; // 徹底隱藏最上方的標題文字
    hud3.innerText = ""; 
    btnRestart.innerText = "重啟宇宙星路 🔄"; 
    btnRestart.style.display = "block";
    renderStage3();
    requestAnimationFrame(tickStage3); // 喚醒最後的銀河列車動態效果
  } else {
    renderStage3();
    requestAnimationFrame(tickStage3);
  }
}

function renderStage3() {
  ctxZ.clearRect(0, 0, canvasZ.width, canvasZ.height);
  if (gameWin3) { drawEndingScene(ctxZ); return; }

  const cameraY = player.y - 300;
  ctxZ.save(); ctxZ.translate(0, -cameraY); 

  backgroundStars.forEach(star => {
    ctxZ.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctxZ.beginPath(); ctxZ.arc(star.x, star.y + (cameraY * 0.15), star.r, 0, Math.PI * 2); ctxZ.fill();
  });

  ctxZ.fillStyle = "#14253d"; ctxZ.strokeStyle = "#1b3a5f"; ctxZ.lineWidth = 1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (mazeWalls[r][c]) { ctxZ.fillRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE); ctxZ.strokeRect(c * CELL_SIZE, r * CELL_SIZE, CELL_SIZE, CELL_SIZE); }
    }
  }

  ctxZ.fillStyle = "rgba(0, 255, 204, 0.15)"; ctxZ.strokeStyle = "#00ffcc"; ctxZ.lineWidth = 3;
  ctxZ.beginPath(); ctxZ.arc(200, 40, 25, 0, Math.PI * 2); ctxZ.fill(); ctxZ.stroke();
  ctxZ.fillStyle = "#00ffcc"; ctxZ.font = "bold 12px Arial"; ctxZ.textAlign = "center"; ctxZ.fillText("躍遷星門 EXIT", 200, 45);

  ctxZ.save(); ctxZ.shadowBlur = 12; ctxZ.shadowColor = "#00ffcc"; ctxZ.fillStyle = "#ffffff";
  ctxZ.beginPath(); ctxZ.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctxZ.fill(); ctxZ.restore();

  let lavaGradient = ctxZ.createLinearGradient(0, lavaY, 0, lavaY + 500);
  lavaGradient.addColorStop(0, "rgba(255, 51, 102, 0.85)"); lavaGradient.addColorStop(0.2, "rgba(255, 102, 0, 0.7)"); lavaGradient.addColorStop(1, "rgba(2, 7, 18, 0.9)");
  ctxZ.fillStyle = lavaGradient; ctxZ.fillRect(0, lavaY, 400, MAP_HEIGHT - lavaY + 500);

  ctxZ.strokeStyle = "rgba(255, 102, 0, 0.4)"; ctxZ.lineWidth = 4; ctxZ.beginPath();
  for (let x = 0; x <= 400; x += 20) {
    let waveOffset = Math.sin((x + Date.now() * 0.1) * 0.05) * 8;
    if (x === 0) ctxZ.moveTo(x, lavaY + waveOffset); else ctxZ.lineTo(x, lavaY + waveOffset);
  }
  ctxZ.stroke(); ctxZ.restore();
}

// 繪製：開往夢幻南十字星列車 (完美修復動態流光版本)
function drawEndingScene(ctx) {
  const time = Date.now() * 0.001; // 動態時間因子

  // 1. 夢幻星空漸層
  let skyGlow = ctx.createLinearGradient(0, 0, 0, 500);
  skyGlow.addColorStop(0, "#010714"); skyGlow.addColorStop(0.4, "#041530"); skyGlow.addColorStop(0.8, "#0c3359"); skyGlow.addColorStop(1, "#185a70");
  ctx.fillStyle = skyGlow; ctx.fillRect(0, 0, 400, 500);

  // 波動極光 (動態！)
  ctx.save(); ctx.globalAlpha = 0.15; ctx.strokeStyle = "#3be8b0"; ctx.lineWidth = 30; ctx.beginPath();
  for (let x = -50; x <= 450; x += 10) {
    let y = 180 + Math.sin(x * 0.01 + time * 2) * 30 + Math.cos(x * 0.005) * 15; // 火車煙霧與流光加倍躍動
    if (x === -50) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke(); ctx.restore();

  // 2. 繁星點綴 (呼吸效果動態！)
  ctx.save();
  for (let i = 0; i < 60; i++) {
    let seedX = (i * 233) % 400; let seedY = (i * 127) % 350;
    let starAlpha = 0.2 + Math.sin(time * 3 + i) * 0.5; // 加快星星閃爍頻率
    ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0.1, starAlpha)})`;
    ctx.beginPath(); ctx.arc(seedX, seedY, 1 + (i % 2), 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  // 3. 巨大發光南十字星
  ctx.save(); const crossX = 240; const crossY = 220;
  let starGlow = ctx.createRadialGradient(crossX, crossY, 2, crossX, crossY, 65 + Math.sin(time*5)*5); // 核心十字自發光微弱收縮
  starGlow.addColorStop(0, "rgba(255, 255, 255, 0.95)"); starGlow.addColorStop(0.2, "rgba(0, 255, 204, 0.4)"); starGlow.addColorStop(0.6, "rgba(12, 51, 89, 0.15)"); starGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
  ctx.fillStyle = starGlow; ctx.beginPath(); ctx.arc(crossX, crossY, 75, 0, Math.PI * 2); ctx.fill();

  ctx.strokeStyle = "rgba(0, 255, 204, 0.4)"; ctx.lineWidth = 8; ctx.lineCap = "round"; ctx.beginPath();
  ctx.moveTo(crossX, crossY - 50); ctx.lineTo(crossX, crossY + 50); ctx.moveTo(crossX - 35, crossY - 10); ctx.lineTo(crossX + 35, crossY - 10); ctx.stroke();

  drawStar(ctx, crossX, crossY - 50, 6, "#ffffff", 12, "#ffcc00");      
  drawStar(ctx, crossX, crossY + 50, 8, "#ffffff", 18, "#00ffcc");      
  drawStar(ctx, crossX - 35, crossY - 10, 7, "#ffffff", 15, "#ffcc00");  
  drawStar(ctx, crossX + 35, crossY - 10, 5, "#ffffff", 10, "#ffcc00");  
  drawStar(ctx, crossX + 12, crossY + 22, 3, "#ffcc00", 5, "#ff8800");   
  ctx.restore();

  // 4. 地平線山陵
  ctx.save(); ctx.fillStyle = "#091c33"; ctx.beginPath(); ctx.moveTo(-10, 430); ctx.quadraticCurveTo(100, 390, 220, 420); ctx.quadraticCurveTo(320, 440, 410, 380); ctx.lineTo(410, 510); ctx.lineTo(-10, 510); ctx.fill();
  let hillGrad = ctx.createLinearGradient(0, 400, 0, 500); hillGrad.addColorStop(0, "#2c1c3d"); hillGrad.addColorStop(1, "#0a0514");
  ctx.fillStyle = hillGrad; ctx.beginPath(); ctx.moveTo(-10, 460); ctx.quadraticCurveTo(150, 400, 300, 450); ctx.quadraticCurveTo(350, 470, 410, 440); ctx.lineTo(410, 510); ctx.lineTo(-10, 510); ctx.fill();
  ctx.strokeStyle = "rgba(180, 100, 255, 0.4)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(-10, 460); ctx.quadraticCurveTo(150, 400, 300, 450); ctx.quadraticCurveTo(350, 470, 410, 440); ctx.stroke(); ctx.restore();

  // 5. 蒸汽火車
  ctx.save(); ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-10, 485); ctx.quadraticCurveTo(120, 445, 250, 470); ctx.stroke();
  const trainX = 90; const trainY = 460;
  ctx.fillStyle = "#0c335c"; ctx.strokeStyle = "#ffcc00"; ctx.lineWidth = 1.5; roundRect(ctx, trainX, trainY - 12, 35, 18, 4, true, true);
  ctx.fillStyle = "#ffcc00"; ctx.fillRect(trainX + 18, trainY - 8, 8, 5);
  ctx.fillStyle = "#111"; ctx.beginPath(); ctx.arc(trainX + 8, trainY + 8, 4, 0, Math.PI*2); ctx.arc(trainX + 26, trainY + 8, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#134275"; roundRect(ctx, trainX - 42, trainY - 8, 36, 14, 3, true, true);
  ctx.fillStyle = "#ffd54f"; ctx.fillRect(trainX - 36, trainY - 4, 6, 4); ctx.fillRect(trainX - 26, trainY - 4, 6, 4); ctx.fillRect(trainX - 16, trainY - 4, 6, 4);
  ctx.strokeStyle = "#8da9c4"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(trainX - 6, trainY + 2); ctx.lineTo(trainX, trainY + 2); ctx.stroke();

  // 6. 蒸汽煙霧 (完美復活動態流沙飄移！)
  for (let j = 0; j < 4; j++) {
    let smokeOffset = (time * 40 + j * 25) % 100; // 調整煙霧生成速度與密度
    let smokeAlpha = 0.55 - (smokeOffset / 100);
    let sizeRadius = 6 + smokeOffset * 0.18;
    ctx.fillStyle = `rgba(240, 243, 250, ${Math.max(0, smokeAlpha)})`;
    ctx.beginPath();
    // 讓白煙順滑地往斜上方噴吐、變大散開
    ctx.arc(trainX + 28 - smokeOffset * 0.7, trainY - 16 - smokeOffset * 0.5, sizeRadius, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // 7. 霓虹發光大標題
  ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = "#00ffcc"; ctx.fillStyle = "#ffffff"; ctx.font = "bold 22px Arial, Microsoft JhengHei"; ctx.textAlign = "center";
  ctx.fillText("旅程終了！南十字星就在眼前！", 200, 75); ctx.restore();
}

  tickStage3(); 
});

document.getElementById("btnGoToStage2").addEventListener("click", () => {
  document.getElementById("stage1").classList.remove("active-stage");
  document.getElementById("stage2").classList.add("active-stage");
  initStage2();
});

document.getElementById("btnGoToStage3").addEventListener("click", () => {
  document.getElementById("stage2").classList.remove("active-stage");
  document.getElementById("stage3").classList.add("active-stage");
  initStage3();
});

// ⭐ 修改：讓第三關重來時不用回第一關，而是直接就地滿血復活！
document.getElementById("btnRestart").addEventListener("click", () => {
  if (gameWin3) {
    // 【狀況 A】如果玩家是通關全破了，點擊「重啟宇宙星路」才真正回第一關完整重來
    foundCount = 0; gameOver1 = false;
    differences.forEach(d => d.found = false);
    hud1.innerText = "尋找異象：0 / 4";
    document.getElementById("btnGoToStage2").style.display = "none";
    
    document.getElementById("stage3").classList.remove("active-stage");
    document.getElementById("stage1").classList.add("active-stage");
    renderStage1();
  } else {
    // 【狀況 B】如果是被心宿二吞噬失敗，直接就地重新生成當前第三關，不回第一關！
    initStage3();
  }
});

// 找碴浮動文字動畫循環
function mainGameLoop() {
  if (floatingTexts1.length > 0) renderStage1();
  requestAnimationFrame(mainGameLoop);
}

renderStage1();
requestAnimationFrame(mainGameLoop);
</script>
