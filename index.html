<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>櫻桃小丸子之宇宙鐵道之旅</title>
  <link rel="icon" href="https://raw.githubusercontent.com/tam004team/Great_salt_lake/main/images/Salt_lake_icon.png" type="image/png">
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: 'Noto Sans TC', sans-serif;
      color: #f4f6fc; /* 🌟 改為乳白星光色 */
      text-align: center;
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;

      /* 🎯 點綴：深空藍底 + 夢幻星塵紫 + 溫馨櫻花粉光暈 */
      background:
        radial-gradient(circle at 50% 75%, rgba(255, 119, 153, 0.2), transparent 60%), /* 櫻花粉光暈 */
        radial-gradient(circle at 20% 30%, rgba(106, 76, 156, 0.25), transparent 50%), /* 星塵紫 */
        radial-gradient(circle at 80% 25%, rgba(27, 79, 142, 0.3), transparent 60%),  /* 星河藍 */
        #050b1a; /* 極深宇宙藍底 */

      animation: spaceGlow 10s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes spaceGlow {
      0% {
        background-position: 50% 75%, 20% 30%, 80% 25%, 0 0;
      }
      100% {
        background-position: 45% 70%, 25% 35%, 75% 20%, 0 0;
      }
    }

    /* 🎯 按鈕：宇宙鐵道藍，懸停時轉為晨曦金色 */
    button {
      margin: 1em;
      padding: 0.75em 2.5em;
      font-size: 1.2em;
      font-weight: bold;
      border-radius: 20px; /* 🌟 圓角更圓潤，增添童話感 */
      border: 2px solid #ffcc00; /* 金色細邊框 */
      cursor: pointer;
      background: #1e3c72; /* 宇宙鐵道藍 */
      color: #ffffff;
      box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
      transition:库 all 0.3s ease;
    }
    button:hover { 
      background: #f1c40f; /* 晨曦金 */
      color: #050b1a;      /* 深色字 */
      box-shadow: 0 0 25px rgba(241, 196, 15, 0.6);
      border-color: #ffffff;
    }

    .container {
      position: relative;
      z-index: 1;
      padding-top: 5vh;
    }

    /* 🎯 標題：小丸子粉 ✕ 溫暖星芒金發光 */
    h1 {
      font-size: 2.3em;
      color: #ffffff;
      font-weight: bold;
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: 1px;
      /* 🌟 櫻花粉核心，黃金星芒外發光 */
      text-shadow: 
        0 0 4px #ff7799, 
        0 0 10px #ff7799, 
        0 0 18px #ffd700, 
        0 0 30px #ffd700;
    }

    h3 { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,0.3); } /* 金黃亮色 */
    h4 { font-size: 1.3em; line-height: 1.6; color: #fff4a3; } /* 溫柔淡黃 */
    h5 { font-size: 1.2em; color: #5bcfff; text-shadow: 0 0 5px rgba(91,207,255,0.3); } /* 晴空藍 */
    p { color: #e2e8f0; line-height: 1.5; }

    .intro {
      text-align: justify;
      background: rgba(255, 255, 255, 0.04); /* 🌟 半透明白，融於星空 */
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1em;
      border-radius: 15px;
      max-width: 500px;
      margin: 0 auto;
    }

    footer {
      margin-top: 2em;
      font-size: 0.9em;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <div id="start-screen">
      <h1>櫻桃小丸子之宇宙鐵道之旅</h1>
      <h4>現在就去一睹令人嚮往的南十字星的風采吧!</h4>
      <div class="intro">
        <h5>隨小丸子與小玉搭上這班通往南十字星的宇宙鐵道列車。</h5>
        <h5>宇宙劇場電影《櫻桃小丸子 南十字星的奇幻之旅》的故事化為這款結合數個關卡的小遊戲。</h5>
        <h5>目標:南十字星，出發!</h5>
        <h3>🔍 遊戲說明</h3>
        <p>🎮 <strong>玩法簡介</strong><br>詳見各小關卡頁面。</p>
        <p>🎯 <strong>目標與結局</strong><br>克服各中途站的重重挑戰，最後一定要親眼看見南十字星!</p>
      </div>
      <p style="font-size: 0.9em; color: #a0aec0; margin-top: 20px;">註：本遊戲介面設計以手機使用者為主，於電腦瀏覽時部分內容可能無法完整顯示。</p>
      <button onclick="startGame()">列車出發</button>
    </div>
  </div>

  <script>
    function startGame() {
      localStorage.removeItem('gameTime');
      location.href = "./game1.html";
    }
  </script>
</body>
</html>
