<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>珊瑚礁保衛戰</title>
  <link rel="icon" href="https://raw.githubusercontent.com/tam004team/Great_salt_lake/main/images/Salt_lake_icon.png" type="image/png">
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: 'Noto Sans TC', sans-serif;
      color: white;
      text-align: center;
    }

.stars {
  position: fixed;
  width: 100%;
  height: 100%;

  /* 🎯 黑底 + 海洋光暈 */
  background:
    radial-gradient(circle at 50% 70%, rgba(0,150,255,0.25), transparent 60%),
    radial-gradient(circle at 20% 30%, rgba(0,100,200,0.2), transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(0,80,180,0.15), transparent 50%),
    black;

  animation: oceanGlow 8s ease-in-out infinite alternate;

  z-index: 0;
}

@keyframes oceanGlow {
  0% {
    background-position: 50% 70%, 20% 30%, 80% 20%, 0 0;
  }
  100% {
    background-position: 55% 75%, 25% 35%, 75% 25%, 0 0;
  }
}

    button {
      margin: 1em;
      padding: 0.75em 2em;
      font-size: 1.2em;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #1e90ff;
      color: white;
      transition: background 0.3s ease;
    }
    button:hover { background: #63b3ed; }

    .container {
      position: relative;
      z-index: 1;
      padding-top: 5vh;
    }

    h1 {
      font-size: 2.5em;
      color: #ffffff;
      font-weight: bold;
      text-align: center;
      margin-bottom: 35px;
      text-shadow: 0 0 5px #f08080, 0 0 10px #f08080, 0 0 15px #f08080, 0 0 20px #f08080;
    }

    h3 { color: #ffffff; }
    h4 { font-size: 1.4em; line-height: 1.6; color: #f0e68c; }
    h5 { font-size: 1.2em; color: #00bfff; }
    p { color: #ffffff; }

    .intro {
      text-align: justify;
      background: rgba(255,255,255,0.05);
      padding: 0.5em;
      border-radius: 10px;
    }

    footer {
      margin-top: 2em;
      font-size: 0.9em;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <div id="start-screen">
      <h1>珊瑚礁保衛戰</h1>
      <h4>海洋正遭受人造垃圾的侵蝕<br>對抗那不斷擴散的污染吧!</h4>
      <div class="intro">
        <h5>協助小不點與藍藍、小傑挺身而出，展開一場守護海洋的行動。海洋的命運，現在就掌握在你們手中!</h5>
        <h5>立體劇場電影《夢幻珊瑚礁》的故事化為這款三消小遊戲。一起拯救這片被忽視的蔚藍世界!</h5>
        <h3>🔍 遊戲說明</h3>
        <p>💧 <strong>背景故事</strong><br>人類過度開發摧毀了三隻小魚的家園，牠們被迫展開與這些污染的對抗。</p>
        <p>🎮 <strong>玩法簡介</strong><br>點擊右下"遊戲規則"按鈕查看。</p>
        <p>🎯 <strong>目標與結局</strong><br>透過清除海底垃圾、達成任務需求，你將一步步拯救海洋――這個所有生物最初的家園!</p>
      </div>
      <p>註：本遊戲介面設計以手機使用者為主，於電腦瀏覽時部分內容可能無法完整顯示。</p>
      <button onclick="startGame()">作戰開始</button>
      <button onclick="goToRules()">遊戲規則</button>
    </div>
  </div>

  <script>
    function startGame() {
      localStorage.removeItem('gameTime');
      // 若遊戲與 index.html 同目錄，直接跳轉
      location.href = "./stage1.html";
    }

    function goToRules() {
  location.href = "./rules.html"; // ⚠️ 這裡填你的規則頁檔名
}
  </script>
</body>
</html>
