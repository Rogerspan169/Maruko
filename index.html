<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>櫻桃小丸子之宇宙鐵道之旅</title>
  <link rel="icon" href="https://raw.githubusercontent.com/tam004team/Great_salt_lake/main/images/Salt_lake_icon.png" type="image/png">
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: 'Noto Sans TC', sans-serif;
      color: #f7fafc; /* 乳白星光色 */
      text-align: center;
    }

    .stars {
      position: fixed;
      width: 100%;
      height: 100%;

      /* 🎯 暖色升級：黑醋栗紫夜底 + 夕陽澄橘 + 櫻花粉 + 暖紫光暈 */
      background:
        radial-gradient(circle at 50% 70%, rgba(255, 140, 0, 0.23), transparent 60%),  /* 1. 溫暖夕陽橘 */
        radial-gradient(circle at 20% 35%, rgba(255, 105, 180, 0.2), transparent 50%), /* 2. 小丸子櫻花粉 */
        radial-gradient(circle at 80% 30%, rgba(142, 68, 173, 0.22), transparent 60%), /* 3. 幻夢星雲暖紫 */
        #11052c; /* 極深黑醋栗紫夜底，徹底擺脫海洋藍 */

      animation: spaceGlow 12s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes spaceGlow {
      0% {
        background-position: 50% 70%, 20% 35%, 80% 30%, 0 0;
      }
      100% {
        background-position: 55% 75%, 15% 30%, 85% 25%, 0 0;
      }
    }

    /* 🎯 按鈕：升級為琥珀澄橘，懸停時綻放晨曦金光 */
    button {
      margin: 1.2em;
      padding: 0.8em 2.8em;
      font-size: 1.2em;
      font-weight: bold;
      border-radius: 25px; /* 圓潤童話感 */
      border: 2px solid #ffbb00; /* 蜜糖金細邊 */
      cursor: pointer;
      background: #e67e22; /* 溫暖琥珀橘 */
      color: #ffffff;
      box-shadow: 0 0 15px rgba(255, 140, 0, 0.25);
      transition: all 0.3s ease;
      letter-spacing: 2px;
    }
    button:hover { 
      background: #f39c12; /* 晨曦金 */
      color: #ffffff;      
      box-shadow: 0 0 25px rgba(243, 156, 18, 0.7);
      border-color: #ffffff;
      transform: scale(1.03); /* 微微放大增加點擊反饋 */
    }

    .container {
      position: relative;
      z-index: 1;
      padding-top: 5vh;
    }

    /* 🎯 標題：粉櫻核心 ✕ 溫暖蜜糖金發光 */
    h1 {
      font-size: 2.3em;
      color: #ffffff;
      font-weight: bold;
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: 1px;
      /* 櫻花粉核心，蜜糖金外發光，溫馨感拉滿 */
      text-shadow: 
        0 0 4px #ff7799, 
        0 0 10px #ff7799, 
        0 0 20px #ffbb00, 
        0 0 35px #ffbb00;
    }

    h3 { color: #ffbb00; text-shadow: 0 0 8px rgba(255,187,0,0.3); } /* 蜜糖金 */
    h4 { font-size: 1.3em; line-height: 1.6; color: #fff5bc; } /* 溫柔晨曦淡黃 */
    h5 { font-size: 1.2em; color: #ff99bb; text-shadow: 0 0 5px rgba(255,153,187,0.3); } /* 溫馨粉櫻色 */
    p { color: #f0f4f8; line-height: 1.6; }

    .intro {
      text-align: justify;
      background: rgba(255, 255, 255, 0.03); /* 半透明暖白襯底 */
      border: 1px solid rgba(255, 187, 0, 0.1); /* 帶有微弱金邊的內框 */
      padding: 1.2em;
      border-radius: 15px;
      max-width: 500px;
      margin: 0 auto;
      box-shadow: inset 0 0 15px rgba(255, 140, 0, 0.05);
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <div id="start-screen">
      <h1>櫻桃小丸子之宇宙鐵道之旅</h1>
      <h4>現在就去一睹令人嚮往的南十字星的風采吧!</h4>
      <div class="intro">
        <h5>隨小丸子與小玉搭上這班通往南十字星的宇宙鐵道列車。</h5>
        <h5>宇宙劇場電影《櫻桃小丸子 南十字星的奇幻之旅》的故事化為這款結合數個關卡的小遊戲。</h5>
        <h5>目標:南十字星，出發!</h5>
        <h3>🔍 遊戲說明</h3>
        <p>🎮 <strong>玩法簡介</strong><br>詳見各小關卡頁面。</p>
        <p>🎯 <strong>目標與結局</strong><br>克服各中途站的重重挑戰，最後一定要親眼看見南十字星!</p>
      </div>
      <p style="font-size: 0.9em; color: #cbd5e1; margin-top: 25px;">註：本遊戲介面設計以手機使用者為主，於電腦瀏覽時部分內容可能無法完整顯示。</p>
      <button onclick="startGame()">列車出發</button>
    </div>
  </div>

  <script>
    function startGame() {
      localStorage.removeItem('gameTime');
      location.href = "./game1.html";
    }
  </script>
</body>
</html>
